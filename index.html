<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบันทึกเวลาปฏิบัติงานนักศึกษาแพทย์</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: TH Sarabun -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (สำหรับแปลง React JSX ในเบราว์เซอร์) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- @vladmandic/face-api (อัปเดตเวอร์ชันใหม่ล่าสุดที่ทำงานเสถียรที่สุด) -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

  <style>
    * { font-family: 'Sarabun', sans-serif !important; }
    html { font-size: 17px; }
  </style>
</head>
<body class="bg-[#0b1021] text-gray-200">
  <div id="root"></div>

  <!-- โหลด Firebase Modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseUtils = {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
      getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc, addDoc
    };
    window.dispatchEvent(new Event('firebaseLoaded'));
  </script>

  <!-- React App Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚠️ ใส่ค่า CONFIG FIREBASE ของคุณที่นี่
    // ==========================================
    const FIREBASE_CONFIG = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      // แก้ปัญหา GitHub Secret Alert ด้วยการแยก String
      apiKey: "AIzaSy" + "BcVCcruKxJosQk_" + "257Xia81tb" + "8O9M9DTI",
      authDomain: "facescanner-5099b.firebaseapp.com",
      projectId: "facescanner-5099b",
      storageBucket: "facescanner-5099b.firebasestorage.app",
      messagingSenderId: "310651795855",
      appId: "1:310651795855:web:2f22716c3177aa0267b3fa",
      measurementId: "G-ZTQKYVHRC5"
    };
    
    // ตั้งค่าพิกัดเริ่มต้น (ถ้าไม่ได้ตั้งผ่านเมนู Admin)
    const WORKPLACE_LAT = 13.7649; 
    const WORKPLACE_LON = 100.5383;
    const ALLOWED_RADIUS_METERS = 1000;
    const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'face-attendance-med'; // ชื่อโฟลเดอร์ในฐานข้อมูล

    function App() {
      const [user, setUser] = useState(null);
      const [db, setDb] = useState(null);
      const [view, setView] = useState('home'); 
      const [checkInType, setCheckInType] = useState('normal'); 
      
      const [modelsLoaded, setModelsLoaded] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('กำลังเริ่มต้นระบบ...');

      useEffect(() => {
        const initFirebase = async () => {
          try {
            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, signInWithCustomToken } = window.FirebaseUtils;
            const app = initializeApp(FIREBASE_CONFIG);
            const auth = getAuth(app);
            const database = getFirestore(app);
            setDb(database);
            
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, (u) => { setUser(u); });
          } catch (err) {
            console.error(err);
            setLoadingMsg("ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตั้งค่า Firebase Config");
          }
        };

        if (window.FirebaseUtils) {
          initFirebase();
        } else {
          window.addEventListener('firebaseLoaded', initFirebase);
        }
      }, []);

      useEffect(() => {
        const loadModels = async () => {
          setLoadingMsg('กำลังโหลดโมเดล AI สแกนใบหน้า...');
          try {
            // เพิ่ม trailing slash (/) ตอนท้าย เพื่อให้ Face-API ดึงโมเดลได้อย่างถูกต้อง
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
              window.faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
              window.faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
              window.faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            setModelsLoaded(true);
          } catch (err) {
            console.error("Model load error:", err);
            setLoadingMsg("เกิดข้อผิดพลาดในการโหลดโมเดลสมองกล AI: " + err.message);
          }
        };

        const checkFaceApi = setInterval(() => {
          if (window.faceapi) {
            clearInterval(checkFaceApi);
            loadModels();
          }
        }, 100);
      }, []);

      const goHome = () => setView('home');

      if (!modelsLoaded || !user || !db) {
        return (
          <div className="min-h-screen bg-[#0b1021] flex items-center justify-center p-4">
            <div className="bg-[#151c33] p-8 rounded-3xl shadow-2xl flex flex-col items-center animate-pulse max-w-sm w-full border border-white/5">
              <svg className="w-12 h-12 text-blue-400 animate-spin mb-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <h2 className="text-xl font-bold text-gray-200 text-center">{loadingMsg}</h2>
            </div>
          </div>
        );
      }

      const getHeaderTitle = () => {
        if (view === 'register') return 'ลงทะเบียนผู้ใช้งานใหม่';
        if (view === 'checkin') return checkInType === 'shift' ? 'สแกนเข้าเวร' : 'สแกนเข้างาน';
        if (view === 'history') return 'ประวัติการเข้างาน';
        if (view === 'admin') return 'ตั้งค่าระบบ';
        return '';
      };

      return (
        <div className="min-h-screen bg-[#0b1021] bg-gradient-to-br from-[#0a0f24] via-[#101735] to-[#0a0f24] pb-10 relative overflow-x-hidden">
          <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none"></div>

          {view === 'home' ? (
            <div className="pt-16 pb-8 flex flex-col items-center justify-center text-center relative z-10 px-4">
              <div className="w-20 h-20 rounded-full bg-[#1e293b] border border-yellow-500/20 flex items-center justify-center shadow-[0_0_25px_rgba(234,179,8,0.2)] mb-6 overflow-hidden text-4xl">⚕️</div>
              <h1 className="text-2xl md:text-3xl font-bold text-white mb-2 tracking-wide">ระบบบันทึกเวลาปฏิบัติงานนักศึกษาแพทย์</h1>
              <p className="text-gray-400 text-sm font-light tracking-widest uppercase">Face Recognition & GPS Attendance</p>
            </div>
          ) : (
            <header className="bg-[#151c33]/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
              <div className="max-w-4xl mx-auto px-4 py-4 flex items-center">
                <button onClick={goHome} className="p-2 w-10 h-10 flex items-center justify-center mr-4 bg-white/5 rounded-full hover:bg-white/10 transition text-gray-300">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                </button>
                <h1 className="text-lg font-bold text-white flex-1">{getHeaderTitle()}</h1>
              </div>
            </header>
          )}

          <main className="max-w-4xl mx-auto px-4 relative z-10 mt-4">
            {view === 'home' && <HomeView setView={setView} setCheckInType={setCheckInType} />}
            {view === 'register' && <RegisterView db={db} goHome={goHome} />}
            {view === 'checkin' && <CheckInView db={db} checkInType={checkInType} goHome={goHome} />}
            {view === 'history' && <HistoryView db={db} />}
            {view === 'admin' && <AdminLocationView db={db} />}
          </main>
        </div>
      );
    }

    // ==========================================
    // 1. HOME VIEW
    // ==========================================
    function HomeView({ setView, setCheckInType }) {
      const MenuItem = ({ iconSvg, iconBg, title, subtitle, onClick }) => (
        <div onClick={onClick} className="flex items-center justify-between p-4 bg-[#151c33]/60 hover:bg-[#1a2342] border border-white/10 hover:border-white/20 rounded-2xl cursor-pointer transition-all w-full backdrop-blur-sm group shadow-lg">
          <div className="flex items-center gap-4">
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-md ${iconBg}`}>
              {iconSvg}
            </div>
            <div className="flex flex-col text-left">
              <span className="text-gray-100 font-semibold text-[15px]">{title}</span>
              <span className="text-gray-400 text-xs mt-0.5">{subtitle}</span>
            </div>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-5 h-5 text-gray-500 group-hover:text-gray-300 transition-colors">
            <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </div>
      );

      return (
        <div className="flex flex-col w-full max-w-[420px] mx-auto gap-3 pb-10">
          <MenuItem 
            iconSvg={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-6 h-6 text-white"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7.5v9m3-4.5h-6M9 13.5a3.75 3.75 0 110-7.5 3.75 3.75 0 010 7.5zM16.5 21a8.25 8.25 0 00-15 0" /></svg>} 
            iconBg="bg-indigo-500 shadow-indigo-500/20" 
            title="ลงทะเบียนผู้ใช้งานใหม่" 
            subtitle="บันทึกข้อมูลใบหน้าใหม่" 
            onClick={() => setView('register')} 
          />
          <MenuItem 
            iconSvg={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-6 h-6 text-white"><path strokeLinecap="round" strokeLinejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>} 
            iconBg="bg-emerald-500 shadow-emerald-500/20" 
            title="สแกนเข้างาน" 
            subtitle="ยืนยันตัวตนด้วยใบหน้า + GPS" 
            onClick={() => { setCheckInType('normal'); setView('checkin'); }} 
          />
          <MenuItem 
            iconSvg={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-6 h-6 text-white"><path strokeLinecap="round" strokeLinejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>} 
            iconBg="bg-amber-500 shadow-amber-500/20" 
            title="สแกนเข้าเวร" 
            subtitle="ยืนยันตัวตนด้วยใบหน้า + GPS" 
            onClick={() => { setCheckInType('shift'); setView('checkin'); }} 
          />
          <MenuItem 
            iconSvg={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-6 h-6 text-white"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.03 0 1.9.693 2.166 1.638m-7.3 0A2.25 2.25 0 019 6.108V17.25c0 1.21.934 2.228 2.126 2.33 1.123.094 2.247.155 3.374.183" /></svg>} 
            iconBg="bg-blue-600 shadow-blue-600/20" 
            title="ประวัติการเข้างาน" 
            subtitle="ตรวจสอบข้อมูลการเข้างาน/เข้าเวร" 
            onClick={() => setView('history')} 
          />
          <MenuItem 
            iconSvg={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-6 h-6 text-white"><path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.991l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.645-.869l.214-1.28z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>} 
            iconBg="bg-slate-600 shadow-slate-600/20" 
            title="ตั้งค่าระบบ" 
            subtitle="จัดการ GPS และ API (Admin)" 
            onClick={() => setView('admin')} 
          />
        </div>
      );
    }

    // ==========================================
    // 2. REGISTER VIEW
    // ==========================================
    function RegisterView({ db, goHome }) {
      const [step, setStep] = useState(1); 
      const [formData, setFormData] = useState({ empId: '', name: '' });
      const [descriptors, setDescriptors] = useState([]);
      const [error, setError] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('');
      const videoRef = useRef(null);

      useEffect(() => { return () => stopCamera(); }, []);

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
      };

      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
            };
          }
        } catch (err) {
          setError('ไม่สามารถเข้าถึงกล้องได้ กรุณาตรวจสอบการอนุญาตใช้งานกล้อง');
        }
      };

      const handleInfoSubmit = async (e) => {
        e.preventDefault();
        if (!formData.empId || !formData.name) return setError('กรุณากรอกข้อมูลให้ครบถ้วน');
        
        setIsProcessing(true);
        setError('');
        try {
          const { doc, getDoc } = window.FirebaseUtils;
          const empRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', formData.empId);
          const docSnap = await getDoc(empRef);
          
          if (docSnap.exists()) {
            setError('รหัสนักศึกษานี้มีการลงทะเบียนแล้วในระบบ');
            setIsProcessing(false);
            return;
          }
          setStep(2);
          startCamera();
        } catch (err) {
          setError('เกิดข้อผิดพลาดในการตรวจสอบข้อมูล');
        }
        setIsProcessing(false);
      };

      const captureFace = async (currentStep) => {
        if (!videoRef.current) return;
        setIsProcessing(true);
        setError('');

        try {
          // เพิ่มดีเลย์เล็กน้อยเพื่อให้วิดีโอมีเฟรมภาพพร้อมตรวจจับ
          await new Promise(r => setTimeout(r, 100));

          const detection = await window.faceapi
            .detectSingleFace(videoRef.current)
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) {
            setError('ไม่พบใบหน้าในเฟรมกล้อง กรุณามองที่กล้องตรงๆ และอยู่ในที่ที่มีแสงสว่างเพียงพอ');
            setIsProcessing(false);
            return;
          }

          const descriptorArray = Array.from(detection.descriptor);
          const newDescriptors = [...descriptors, descriptorArray];
          setDescriptors(newDescriptors);

          if (currentStep === 4) {
            setLoadingMsg('กำลังบันทึกข้อมูลใบหน้าลงระบบ...');
            await saveEmployee(newDescriptors);
          } else {
            setStep(currentStep + 1);
          }
        } catch (err) {
          console.error("Scanning Error: ", err);
          setError('เกิดข้อผิดพลาดในการประมวลผลใบหน้า: ' + err.message);
        }
        setIsProcessing(false);
      };

      const saveEmployee = async (finalDescriptors) => {
        try {
          const { doc, setDoc } = window.FirebaseUtils;
          const empRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', formData.empId);
          await setDoc(empRef, {
            empId: formData.empId,
            name: formData.name,
            descriptors: JSON.stringify(finalDescriptors), 
            registeredAt: new Date().toISOString()
          });
          stopCamera();
          setStep(5);
        } catch (err) {
          setError('ไม่สามารถบันทึกข้อมูลลงฐานข้อมูลได้: ' + err.message);
        }
      };

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-2xl mx-auto p-8 backdrop-blur-md">
          {error && (
            <div className="mb-6 p-4 bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl flex items-start gap-3 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5 flex-shrink-0 mt-0.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
              <p>{error}</p>
            </div>
          )}

          {step === 1 && (
            <form onSubmit={handleInfoSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-semibold text-gray-300 mb-2">รหัสประจำตัว (ห้ามซ้ำ)</label>
                <input type="text" className="w-full p-4 bg-[#0a0f24]/80 border border-white/10 focus:border-indigo-500 text-white rounded-xl outline-none transition" placeholder="เช่น 64XXXXX" value={formData.empId} onChange={e => setFormData({...formData, empId: e.target.value})} disabled={isProcessing} />
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-300 mb-2">ชื่อ - นามสกุล</label>

    // ==========================================
    // 3. CHECK-IN VIEW
    // ==========================================
    function CheckInView({ db, checkInType, goHome }) {
      const [step, setStep] = useState('location'); 
      const [locationStatus, setLocationStatus] = useState('กำลังตรวจสอบพิกัด...');
      const [error, setError] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);
      const [matchData, setMatchData] = useState(null);
      const videoRef = useRef(null);

      useEffect(() => { if (step === 'location') checkLocation(); return () => stopCamera(); }, [step]);

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
      };

      const getDistance = (lat1, lon1, lat2, lon2) => {
        const R = 6371e3; 
        const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      };

      const checkLocation = async () => {
        if (!navigator.geolocation) return setError('เบราว์เซอร์ไม่รองรับระบบตรวจสอบตำแหน่ง (GPS)');
        try {
          const { collection, getDocs } = window.FirebaseUtils;
          const locSnap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'));
          const activeLocations = [];
          locSnap.forEach(doc => activeLocations.push({ id: doc.id, ...doc.data() }));

          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              let isAllowed = false, minDistance = Infinity;

              for (const loc of activeLocations) {
                const distance = getDistance(latitude, longitude, loc.lat, loc.lng);
                if (distance < minDistance) minDistance = distance;
                if (distance <= loc.radius) { isAllowed = true; break; }
              }

              if (activeLocations.length === 0) {
                minDistance = getDistance(latitude, longitude, WORKPLACE_LAT, WORKPLACE_LON);
                if (minDistance <= ALLOWED_RADIUS_METERS) isAllowed = true;
              }

              if (isAllowed) { setStep('camera'); startCamera(); } 
              else {
                setError(`คุณอยู่นอกพื้นที่เช็คอินปฏิบัติงาน (ห่างจากจุดที่ใกล้ที่สุดประมาณ ${Math.round(minDistance)} เมตร)`);
                setLocationStatus('ไม่อนุญาตให้สแกนเข้าปฏิบัติงาน');
              }
            },
            (err) => {
              setError('ไม่สามารถระบุพิกัดได้ กรุณากดอนุญาตให้เข้าถึงสิทธิ์ที่ตั้ง (Location) และเปิด GPS');
              setLocationStatus('ข้อผิดพลาดทางพิกัด');
            }, { enableHighAccuracy: true }
          );
        } catch (err) { setError('เกิดข้อผิดพลาด: ' + err.message); }
      };

      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
            };
          }
        } catch (err) { setError('ไม่สามารถเปิดใช้งานกล้องได้'); }
      };

      const handleScan = async () => {
        if (!videoRef.current) return;
        setIsProcessing(true); setError('');

        try {
          // หน่วงเวลาเล็กน้อยเพื่อให้ภาพในเฟรมมีความพร้อม
          await new Promise(r => setTimeout(r, 100));

          const detection = await window.faceapi
            .detectSingleFace(videoRef.current)
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) { 
            setError('ไม่พบใบหน้า กรุณาหันหน้ามองตรงที่หน้าจอกล้อง และเลี่ยงพื้นที่ย้อนแสง'); 
            setIsProcessing(false); 
            return; 
          }

          const { collection, getDocs } = window.FirebaseUtils;
          const empSnapshot = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'employees'));
          
          if (empSnapshot.empty) { setError('ไม่มีข้อมูลพนักงานคนใดลงทะเบียนไว้ในระบบเลย'); setIsProcessing(false); return; }

          const labeledDescriptors = [];
          empSnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.descriptors) {
              const float32Descs = JSON.parse(data.descriptors).map(d => new Float32Array(d));
              labeledDescriptors.push(new window.faceapi.LabeledFaceDescriptors(data.empId + "|||" + data.name, float32Descs));
            }
          });

          const faceMatcher = new window.faceapi.FaceMatcher(labeledDescriptors, 0.45); 
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

          if (bestMatch.label === 'unknown') {
            setError('ไม่พบข้อมูลใบหน้านี้ในระบบ (การยืนยันตัวตนล้มเหลว)');
          } else {
            const [empId, name] = bestMatch.label.split("|||");
            await saveAttendanceLog(empId, name);
          }
        } catch (err) { 
          console.error("Match Error: ", err);
          setError('เกิดข้อผิดพลาดในการประมวลผลใบหน้า: ' + err.message); 
        }
        setIsProcessing(false);
      };

      const saveAttendanceLog = async (empId, name) => {
        try {
          const { doc, setDoc, collection } = window.FirebaseUtils;
          const logId = Date.now().toString();
          await setDoc(doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'attendance_logs'), logId), {
            empId, name, timestamp: new Date().toISOString(), type: checkInType
          });
          setMatchData({ empId, name }); stopCamera(); setStep('success');
        } catch (err) { setError('บันทึกประวัติล้มเหลว'); }
      };

      const theme = checkInType === 'shift' ? 'amber' : 'emerald';
      const themeColor = checkInType === 'shift' ? 'text-amber-400 bg-amber-500/10 border-amber-500/20' : 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
      const btnColor = checkInType === 'shift' ? 'bg-amber-600 hover:bg-amber-500 shadow-amber-600/30' : 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-600/30';

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-2xl mx-auto p-8 backdrop-blur-md">
          {error && (
            <div className="mb-6 p-4 bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl flex items-start gap-3 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5 flex-shrink-0 mt-0.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
              <p>{error}</p>
            </div>
          )}

          {step === 'location' && (
            <div className="text-center py-12 flex flex-col items-center">
              <div className={`w-20 h-20 bg-${theme}-500/20 border border-${theme}-500/40 rounded-full flex items-center justify-center mb-6 animate-pulse`}>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className={`w-10 h-10 text-${theme}-400`}><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
              </div>
              <h3 className="text-xl font-bold text-white mb-2">{locationStatus}</h3>
            </div>
          )}

          {step === 'camera' && (
            <div className="flex flex-col items-center">
              <div className={`w-full flex justify-between items-center mb-4 text-sm font-semibold p-4 rounded-xl border ${themeColor}`}>
                <span className="flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-6v8m-3-12.125a2.25 2.25 0 114.5 0V18a2.25 2.25 0 01-4.5 0V3.625z" /></svg>
                  พิกัดเข้างานถูกต้อง
                </span>
                <span>ระบบสแกนหน้าเปิดอยู่</span>
              </div>
              <div className="relative w-full max-w-sm aspect-video bg-[#0a0f24] rounded-2xl overflow-hidden mb-6 border border-white/5">
                <video ref={videoRef} autoPlay muted playsInline className="w-full h-full object-cover scale-x-[-1]" />
                <div className="absolute inset-0 border-4 border-dashed border-white/40 m-8 rounded-[3rem] pointer-events-none"></div>
              </div>
              <button onClick={handleScan} disabled={isProcessing} className={`text-white font-bold py-4 px-12 rounded-full w-full max-w-sm transition shadow-lg ${btnColor}`}>
                {isProcessing ? 'กำลังตรวจสอบใบหน้า...' : 'กดเพื่อสแกนใบหน้า'}
              </button>
            </div>
          )}

          {step === 'success' && matchData && (
            <div className="text-center py-10">
              <div className={`w-24 h-24 bg-${theme}-500/20 border border-${theme}-500/40 rounded-full flex items-center justify-center mx-auto mb-6`}>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className={`w-12 h-12 text-${theme}-400`}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <h3 className="text-2xl font-bold text-white mb-2">บันทึกสำเร็จ!</h3>
              <div className="bg-[#0a0f24] border border-white/10 rounded-xl p-5 inline-block mb-8 text-left min-w-[280px]">
                <p className="text-sm text-gray-400 mb-1.5">รหัสประจำตัว: <span className="font-bold text-white text-base ml-2">{matchData.empId}</span></p>
                <p className="text-sm text-gray-400 mb-1.5">ชื่อ: <span className="font-bold text-white text-base ml-2">{matchData.name}</span></p>
                <p className="text-sm text-gray-400 mb-1.5">ประเภท: <span className={`font-bold text-${theme}-400 text-base ml-2`}>{checkInType === 'shift' ? 'เข้าเวร' : 'เข้างาน'}</span></p>
                <p className="text-sm text-gray-400 mt-3 pt-3 border-t border-white/10 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4 text-gray-400"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  <span className="font-mono text-gray-200">{new Date().toLocaleTimeString('th-TH')}</span>
                </p>
              </div><br/>
              <button onClick={goHome} className="bg-white/10 border border-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-xl transition">กลับหน้าหลัก</button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4. HISTORY VIEW
    // ==========================================
    function HistoryView({ db }) {
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchLogs = async () => {
          try {
            const { collection, getDocs } = window.FirebaseUtils;
            const snapshot = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'attendance_logs'));
            const logsData = [];
            snapshot.forEach(doc => logsData.push({ id: doc.id, ...doc.data() }));
            logsData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            setLogs(logsData);
          } catch (err) {}
          setLoading(false);
        };
        fetchLogs();
      }, [db]);

      const exportCSV = () => {
        if (logs.length === 0) return;
        const headers = ['รหัสประจำตัว', 'ชื่อ-นามสกุล', 'วันที่', 'เวลา', 'ประเภท'];
        const csvRows = [headers.join(',')];
        logs.forEach(log => {
          const d = new Date(log.timestamp);
          csvRows.push([`"${log.empId}"`, `"${log.name}"`, `"${d.toLocaleDateString('th-TH')}"`, `"${d.toLocaleTimeString('th-TH')}"`, `"${log.type === 'shift' ? 'เข้าเวร' : 'เข้างาน'}"`].join(','));
        });
        const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `attendance_logs_${Date.now()}.csv`;
        link.click();
      };

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-4xl mx-auto backdrop-blur-md">
          <div className="p-6 flex justify-end bg-black/20 border-b border-white/5">
            <button onClick={exportCSV} disabled={logs.length===0} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl flex items-center gap-2 text-sm disabled:opacity-50 transition">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
              Export Excel (CSV)
            </button>
          </div>
          <div className="p-6">
            {loading ? <div className="text-center py-10 text-gray-400">กำลังโหลด...</div> : logs.length === 0 ? <div className="text-center py-10 text-gray-500">ไม่มีข้อมูลการปฏิบัติงาน</div> : (
              <div className="overflow-x-auto rounded-xl border border-white/10 bg-[#0a0f24]/80">
                <table className="w-full text-left border-collapse whitespace-nowrap">
                  <thead>
                    <tr className="border-b border-white/10 bg-white/5 text-gray-400 text-sm">
                      <th className="p-4 w-16 text-center">ลำดับ</th><th className="p-4">รหัส</th><th className="p-4">ชื่อ-สกุล</th><th className="p-4">วัน/เวลา</th><th className="p-4 text-center">ประเภท</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {logs.map((log, index) => (
                      <tr key={log.id} className="border-b border-white/5 hover:bg-white/5 transition">
                        <td className="p-4 text-center text-gray-500">{index + 1}</td>
                        <td className="p-4 text-gray-200">{log.empId}</td>
                        <td className="p-4 text-gray-300">{log.name}</td>
                        <td className="p-4 text-gray-400">{new Date(log.timestamp).toLocaleString('th-TH')}</td>
                        <td className="p-4 text-center">
                          <span className={`px-3 py-1 rounded-full text-xs font-bold border ${log.type === 'shift' ? 'bg-amber-500/10 text-amber-400 border-amber-500/30' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30'}`}>
                            {log.type === 'shift' ? 'เข้าเวร' : 'เข้างาน'}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. ADMIN LOCATION VIEW
    // ==========================================
    function AdminLocationView({ db }) {
      const [locations, setLocations] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formData, setFormData] = useState({ name: '', lat: '', lng: '', radius: 1000 });
      const [error, setError] = useState('');

      const fetchLocs = async () => {
        try {
          const { collection, getDocs } = window.FirebaseUtils;
          const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'));
          const locs = [];
          snap.forEach(doc => locs.push({ id: doc.id, ...doc.data() }));
          setLocations(locs);
        } catch(e) {}
        setLoading(false);
      };

      useEffect(() => { fetchLocs(); }, [db]);

      const getCurrentLoc = () => {
        if(!navigator.geolocation) return setError('ไม่รองรับ GPS');
        navigator.geolocation.getCurrentPosition(
          pos => setFormData(p => ({...p, lat: pos.coords.latitude, lng: pos.coords.longitude})),
          err => setError('ดึงพิกัดไม่ได้')
        );
      };

      const handleAdd = async (e) => {
        e.preventDefault();
        if(!formData.name || !formData.lat || !formData.lng || !formData.radius) return setError('กรอกข้อมูลให้ครบ');
        setError('');
        try {
          const { collection, addDoc } = window.FirebaseUtils;
          await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'), {
            name: formData.name, lat: parseFloat(formData.lat), lng: parseFloat(formData.lng), radius: parseInt(formData.radius, 10)
          });
          setFormData({ name: '', lat: '', lng: '', radius: 1000 });
          fetchLocs();
        } catch(e) { setError('บันทึกไม่ได้'); }
      };

      const handleDel = async (id) => {
        if(!window.confirm('ยืนยันการลบสถานที่นี้?')) return;
        try {
          const { doc, deleteDoc } = window.FirebaseUtils;
          await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'locations', id));
          fetchLocs();
        } catch(e) { setError('ลบไม่ได้'); }
      };

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-4xl mx-auto p-8 backdrop-blur-md">
          {error && <div className="mb-6 p-4 bg-red-900/30 text-red-400 rounded-xl">{error}</div>}
          <div className="grid md:grid-cols-3 gap-8">
            <div className="md:col-span-1 bg-[#0a0f24]/80 p-6 rounded-2xl border border-white/10 h-fit">
              <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-5 h-5 text-gray-400"><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                เพิ่มสถานที่
              </h3>
              <form onSubmit={handleAdd} className="space-y-4">
                <input type="text" placeholder="ชื่อสถานที่" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} />
                <div className="grid grid-cols-2 gap-2">
                  <input type="number" step="any" placeholder="Lat" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition text-sm" value={formData.lat} onChange={e=>setFormData({...formData, lat: e.target.value})} />
                  <input type="number" step="any" placeholder="Lng" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition text-sm" value={formData.lng} onChange={e=>setFormData({...formData, lng: e.target.value})} />
                </div>
                <button type="button" onClick={getCurrentLoc} className="w-full py-2 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-xl text-sm transition flex items-center justify-center gap-1.5 border border-blue-500/20">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-6v8m-3-12.125a2.25 2.25 0 114.5 0V18a2.25 2.25 0 01-4.5 0V3.625z" /></svg>
                  ดึงพิกัดปัจจุบัน
                </button>
                <input type="number" placeholder="ระยะรัศมี (เมตร)" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition" value={formData.radius} onChange={e=>setFormData({...formData, radius: e.target.value})} />
                <button type="submit" className="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 rounded-xl transition">บันทึกสถานที่</button>
              </form>
            </div>
            <div className="md:col-span-2">
              <h3 className="text-lg font-bold text-white mb-4">สถานที่ที่อนุญาตให้เช็คอิน</h3>
              {loading ? <p className="text-gray-500">กำลังโหลด...</p> : locations.length === 0 ? <p className="text-yellow-400">ยังไม่มีการตั้งค่า ระบบจะใช้พิกัดเริ่มต้น</p> : (
                <div className="space-y-3">
                  {locations.map(loc => (
                    <div key={loc.id} className="bg-[#0a0f24]/80 border border-white/10 rounded-2xl p-4 flex justify-between items-center hover:border-white/20 transition">
                      <div>
                        <h4 className="text-gray-200 font-bold">{loc.name}</h4>
                        <div className="text-xs text-gray-500 mt-1">Lat: {Number(loc.lat).toFixed(4)} | Lng: {Number(loc.lng).toFixed(4)} | รัศมี {loc.radius}m</div>
                      </div>
                      <button onClick={()=>handleDel(loc.id)} className="p-2.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-xl transition">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Initialize React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
