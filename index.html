    // คำนวณระยะห่างระหว่างจุด 2 จุด (สำหรับหาขนาดดวงตา EAR)
    const getDistance = (p1, p2) => {
      return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    };

    // คำนวณค่า Eye Aspect Ratio (EAR) เพื่อตรวจจับการกระพริบตา
    const getEAR = (landmarks) => {
      // ดวงตาซ้าย: พิกัดที่ 36-41
      const p36 = landmarks[36];
      const p37 = landmarks[37];
      const p38 = landmarks[38];
      const p39 = landmarks[39];
      const p40 = landmarks[40];
      const p41 = landmarks[41];

      const dVertical1 = getDistance(p37, p41);
      const dVertical2 = getDistance(p38, p40);
      const dHorizontal = getDistance(p36, p39);
      const leftEAR = (dVertical1 + dVertical2) / (2.0 * dHorizontal);

      // ดวงตาขวา: พิกัดที่ 42-47
      const p42 = landmarks[42];
      const p43 = landmarks[43];
      const p44 = landmarks[44];
      const p45 = landmarks[45];
      const p46 = landmarks[46];
      const p47 = landmarks[47];

      const dVertical3 = getDistance(p43, p47);
      const dVertical4 = getDistance(p44, p46);
      const dHorizontal2 = getDistance(p42, p45);
      const rightEAR = (dVertical3 + dVertical4) / (2.0 * dHorizontal2);

      return (leftEAR + rightEAR) / 2.0;
    };

    // ==========================================
    // 2. REGISTER VIEW
    // ==========================================
    function RegisterView({ db, goHome }) {
      const [step, setStep] = useState(1); 
      const [formData, setFormData] = useState({ empId: '', name: '' });
      const [descriptors, setDescriptors] = useState([]);
      const [error, setError] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('');
      const videoRef = useRef(null);

      useEffect(() => { return () => stopCamera(); }, []);

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
      };

      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
            };
          }
        } catch (err) {
          setError('ไม่สามารถเข้าถึงกล้องได้ กรุณาตรวจสอบการอนุญาตใช้งานกล้อง');
        }
      };

      const handleInfoSubmit = async (e) => {
        e.preventDefault();
        if (!formData.empId || !formData.name) return setError('กรุณากรอกข้อมูลให้ครบถ้วน');
        
        setIsProcessing(true);
        setError('');
        try {
          const { doc, getDoc } = window.FirebaseUtils;
          const empRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', formData.empId);
          const docSnap = await getDoc(empRef);
          
          if (docSnap.exists()) {
            setError('รหัสนักศึกษานี้มีการลงทะเบียนแล้วในระบบ');
            setIsProcessing(false);
            return;
          }
          setStep(2);
          startCamera();
        } catch (err) {
          setError('เกิดข้อผิดพลาดในการตรวจสอบข้อมูล');
        }
        setIsProcessing(false);
      };

      const captureFace = async (currentStep) => {
        if (!videoRef.current) return;
        setIsProcessing(true);
        setError('');

        try {
          await new Promise(r => setTimeout(r, 100));

          const detection = await window.faceapi
            .detectSingleFace(videoRef.current)
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) {
            setError('ไม่พบใบหน้าในเฟรมกล้อง กรุณามองที่กล้องตรงๆ และอยู่ในที่ที่มีแสงสว่างเพียงพอ');
            setIsProcessing(false);
            return;
          }

          const descriptorArray = Array.from(detection.descriptor);
          const newDescriptors = [...descriptors, descriptorArray];
          setDescriptors(newDescriptors);

          if (currentStep === 4) {
            setLoadingMsg('กำลังบันทึกข้อมูลใบหน้าลงระบบ...');
            await saveEmployee(newDescriptors);
          } else {
            setStep(currentStep + 1);
          }
        } catch (err) {
          console.error("Scanning Error: ", err);
          setError('เกิดข้อผิดพลาดในการประมวลผลใบหน้า: ' + err.message);
        }
        setIsProcessing(false);
      };

      const saveEmployee = async (finalDescriptors) => {
        try {
          const { doc, setDoc } = window.FirebaseUtils;
          const empRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', formData.empId);
          await setDoc(empRef, {
            empId: formData.empId,
            name: formData.name,
            descriptors: JSON.stringify(finalDescriptors), 
            registeredAt: new Date().toISOString()
          });
          stopCamera();
          setStep(5);
        } catch (err) {
          setError('ไม่สามารถบันทึกข้อมูลลงฐานข้อมูลได้: ' + err.message);
        }
      };

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-2xl mx-auto p-8 backdrop-blur-md">
          {error && (
            <div className="mb-6 p-4 bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl flex items-start gap-3 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5 flex-shrink-0 mt-0.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
              <p>{error}</p>
            </div>
          )}

          {step === 1 && (
            <form onSubmit={handleInfoSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-semibold text-gray-300 mb-2">รหัสประจำตัว (ห้ามซ้ำ)</label>
                <input type="text" className="w-full p-4 bg-[#0a0f24]/80 border border-white/10 focus:border-indigo-500 text-white rounded-xl outline-none transition" placeholder="เช่น 64XXXXX" value={formData.empId} onChange={e => setFormData({...formData, empId: e.target.value})} disabled={isProcessing} />
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-300 mb-2">ชื่อ - นามสกุล</label>
                <input type="text" className="w-full p-4 bg-[#0a0f24]/80 border border-white/10 focus:border-indigo-500 text-white rounded-xl outline-none transition" placeholder="เช่น นศ.พ. ใจดี" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} disabled={isProcessing} />
              </div>
              <button type="submit" disabled={isProcessing} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl mt-4 transition">
                {isProcessing ? 'กำลังตรวจสอบ...' : 'ถัดไป: สแกนใบหน้า'}
              </button>
            </form>
          )}

          {[2, 3, 4].includes(step) && (
            <div className="flex flex-col items-center">
              <h3 className="text-xl font-bold text-white mb-2">ขั้นตอนที่ {step - 1}/3</h3>
              <p className="text-indigo-400 font-medium mb-6">
                {step === 2 ? "กรุณาหันหน้าตรงและกดถ่ายรูป" : step === 3 ? "กรุณาหันหน้าไปทางซ้ายเล็กน้อย" : "กรุณาหันหน้าไปทางขวาเล็กน้อย"}
              </p>
              
              <div className="relative w-full max-w-lg aspect-[4/3] bg-[#0a0f24] rounded-2xl overflow-hidden mb-6 border border-white/10 shadow-inner">
                <video ref={videoRef} autoPlay muted playsInline className="w-full h-full object-cover scale-x-[-1]" />
                <div className="absolute inset-0 border-4 border-dashed border-white/40 m-12 rounded-full pointer-events-none"></div>
              </div>

              <button onClick={() => captureFace(step)} disabled={isProcessing} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-full flex items-center gap-2 transition shadow-lg shadow-indigo-600/30 w-full max-w-lg justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" /></svg>
                {isProcessing ? (loadingMsg || 'กำลังประมวลผล...') : 'ถ่ายภาพ'}
              </button>
            </div>
          )}

          {step === 5 && (
            <div className="text-center py-10">
              <div className="w-24 h-24 bg-green-500/20 border border-green-500/40 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-12 h-12 text-green-400"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <h3 className="text-2xl font-bold text-white mb-2">ลงทะเบียนสำเร็จ!</h3>
              <p className="text-gray-400 mb-8">ข้อมูลของคุณถูกบันทึกเข้าระบบเรียบร้อยแล้ว</p>
              <button onClick={goHome} className="bg-white/10 hover:bg-white/20 border border-white/10 text-white font-bold py-3 px-8 rounded-xl transition">กลับหน้าหลัก</button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 3. CHECK-IN VIEW (REAL-TIME AUTO SCAN & FAST GPS)
    // ==========================================
    function CheckInView({ db, checkInType, goHome }) {
      const [step, setStep] = useState('location'); 
      const [locationStatus, setLocationStatus] = useState('กำลังตรวจสอบพิกัด...');
      const [error, setError] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);
      const [matchData, setMatchData] = useState(null);
      const [autoScanStatus, setAutoScanStatus] = useState('สแกนเนอร์กำลังค้นหาใบหน้า...');
      const [matchedLocation, setMatchedLocation] = useState(''); 
      const [targetEmpId, setTargetEmpId] = useState(''); 
      const [livenessStatus, setLivenessStatus] = useState(''); // เก็บสถานะคำสั่งกระพริบตา
      
      const videoRef = useRef(null);
      const scanIntervalRef = useRef(null);
      const isAnalyzingRef = useRef(false);

      // Refs สำหรับติดตามสถานะตาและการกระพริบตา (เพื่อไม่ให้ React Re-render ถี่เกินไปจนกระตุก)
      const eyeStateRef = useRef('open'); // 'open' หรือ 'closed'
      const blinkCountRef = useRef(0);
      const matchedUserRef = useRef(null); // ล็อกโปรไฟล์ผู้ใช้เมื่อสแกนโครงหน้าผ่าน

      useEffect(() => { 
        if (step === 'location') {
          checkLocation(); 
        } else if (step === 'camera') {
          startCamera();
        }
        return () => {
          stopCamera();
          stopAutoScan();
        }; 
      }, [step]);

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
      };

      const startAutoScan = () => {
        stopAutoScan();
        // ล้างค่าตรวจสอบความปลอดภัยเดิม
        eyeStateRef.current = 'open';
        blinkCountRef.current = 0;
        matchedUserRef.current = null;
        setLivenessStatus('');

        scanIntervalRef.current = setInterval(() => {
          if (!isAnalyzingRef.current && videoRef.current && videoRef.current.readyState === 4) {
            runRealTimeMatch();
          }
        }, 250);
      };

      const stopAutoScan = () => {
        if (scanIntervalRef.current) {
          clearInterval(scanIntervalRef.current);
          scanIntervalRef.current = null;
        }
      };

      const getDistance = (lat1, lon1, lat2, lon2) => {
        const R = 6371e3; 
        const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      };

      const checkLocation = async () => {
        if (!navigator.geolocation) return setError('เบราว์เซอร์ไม่รองรับระบบตรวจสอบตำแหน่ง (GPS)');
        try {
          const { collection, getDocs } = window.FirebaseUtils;
          const locSnap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'));
          const activeLocations = [];
          locSnap.forEach(doc => activeLocations.push({ id: doc.id, ...doc.data() }));

          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              let isAllowed = false, minDistance = Infinity, matchedLocName = '';

              for (const loc of activeLocations) {
                const distance = getDistance(latitude, longitude, loc.lat, loc.lng);
                if (distance < minDistance) minDistance = distance;
                if (distance <= loc.radius) { 
                  isAllowed = true; 
                  matchedLocName = loc.name;
                  break; 
                }
              }

              if (activeLocations.length === 0) {
                minDistance = getDistance(latitude, longitude, WORKPLACE_LAT, WORKPLACE_LON);
                if (minDistance <= ALLOWED_RADIUS_METERS) {
                  isAllowed = true;
                  matchedLocName = 'พิกัดเริ่มต้น (โรงพยาบาล)';
                }
              }

              if (isAllowed) { 
                setMatchedLocation(matchedLocName);
                setStep('camera'); 
              } else {
                setError(`คุณอยู่นอกพื้นที่เช็คอินปฏิบัติงาน (ห่างจากจุดที่ใกล้ที่สุดประมาณ ${Math.round(minDistance)} เมตร)`);
                setLocationStatus('ไม่อนุญาตให้สแกนบันทึกเวลา');
              }
            },
            (err) => {
              setError('ไม่สามารถระบุพิกัดได้ กรุณากดอนุญาตสิทธิ์การเข้าถึงตำแหน่งพิกัด (Location) และเปิด GPS');
              setLocationStatus('ข้อผิดพลาดทางพิกัด');
            }, 
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
          );
        } catch (err) { setError('เกิดข้อผิดพลาด: ' + err.message); }
      };

      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
              startAutoScan();
            };
          }
        } catch (err) { setError('ไม่สามารถเปิดใช้งานกล้องได้'); }
      };

      const checkLateStatus = (type) => {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const totalMinutes = hours * 60 + minutes;

        if (type === 'normal-in') {
          const limit = 8 * 60 + 30; // 08:30 น.
          if (totalMinutes > limit) return 'เข้างานสาย';
        } else if (type === 'shift-in') {
          const limit = 16 * 60 + 30; // 16:30 น.
          if (totalMinutes > limit) return 'เข้าเวรสาย';
        }
        return '';
      };

      const runRealTimeMatch = async () => {
        isAnalyzingRef.current = true;
        try {
          const detection = await window.faceapi
            .detectSingleFace(videoRef.current)
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) {
            setAutoScanStatus('กำลังสแกนหาใบหน้าของคุณ...');
            // ล้างค่าการยืนยันเมื่อไม่มีใบหน้าสแกน (เช่น ผู้ใช้ออกจากกล้อง)
            matchedUserRef.current = null;
            blinkCountRef.current = 0;
            setLivenessStatus('');
            isAnalyzingRef.current = false;
            return;
          }

          // 1. ตรวจสอบอัตราส่วนขนาดดวงตา (EAR) เพื่อตรวจจับการกระพริบตาที่มีชีวิต (Liveness Verification)
          const landmarks = detection.landmarks.positions;
          const ear = getEAR(landmarks);

          // อัลกอริทึมจับความเร็วในการกระพริบตา (หลับตา EAR < 0.17 และลืมตา EAR > 0.22)
          if (eyeStateRef.current === 'open' && ear < 0.17) {
            eyeStateRef.current = 'closed';
          } else if (eyeStateRef.current === 'closed' && ear > 0.22) {
            eyeStateRef.current = 'open';
            blinkCountRef.current += 1;
          }

          // 2. ขั้นตอนการจับคู่โครงหน้า (หาคู่เทียบในฐานข้อมูล)
          if (!matchedUserRef.current) {
            setAutoScanStatus('ตรวจพบใบหน้า! กำลังเปรียบเทียบฐานข้อมูล...');
            const { collection, getDocs, doc, getDoc } = window.FirebaseUtils;

            // กรณีที่ 1: ระบบ 1:1 Target Verification
            if (targetEmpId.trim()) {
              const empRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', targetEmpId.trim());
              const empSnap = await getDoc(empRef);

              if (empSnap.exists()) {
                const data = empSnap.data();
                if (data.descriptors) {
                  const float32Descs = JSON.parse(data.descriptors).map(d => new Float32Array(d));
                  const labeledDesc = new window.faceapi.LabeledFaceDescriptors(data.empId + "|||" + data.name, float32Descs);
                  const faceMatcher = new window.faceapi.FaceMatcher([labeledDesc], 0.45);
                  const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

                  if (bestMatch.label !== 'unknown') {
                    const [empId, name] = bestMatch.label.split("|||");
                    matchedUserRef.current = { empId, name };
                    blinkCountRef.current = 0; // รีเซ็ตพร้อมเริ่มด่านสแกนกะพริบตา
                  } else {
                    setAutoScanStatus('❌ ใบหน้าไม่ตรงกับรหัส นศ. ที่ระบุไว้');
                  }
                }
              } else {
                setAutoScanStatus('🔍 ไม่พบรหัส นศ. นี้ลงทะเบียนในระบบ');
              }
            } else {
              // กรณีที่ 2: ระบบ 1:N Auto-Scan (ปรับความเข้มงวดสูงมาก 0.38 ป้องกันสแกนหน้าซ้ำผิดตัวบุคคล)
              const empSnapshot = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'employees'));
              
              if (empSnapshot.empty) {
                setError('ไม่มีข้อมูลพนักงานคนใดลงทะเบียนไว้ในระบบเลย');
                stopAutoScan();
                isAnalyzingRef.current = false;
                return;
              }

              const labeledDescriptors = [];
              empSnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.descriptors) {
                  const float32Descs = JSON.parse(data.descriptors).map(d => new Float32Array(d));
                  labeledDescriptors.push(new window.faceapi.LabeledFaceDescriptors(data.empId + "|||" + data.name, float32Descs));
                }
              });

              const faceMatcher = new window.faceapi.FaceMatcher(labeledDescriptors, 0.38); 
              const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

              if (bestMatch.label !== 'unknown') {
                const [empId, name] = bestMatch.label.split("|||");
                matchedUserRef.current = { empId, name };
                blinkCountRef.current = 0; // รีเซ็ตพร้อมเริ่มด่านสแกนกะพริบตา
              } else {
                setAutoScanStatus('ไม่พบใบหน้านี้ในระบบ (เกณฑ์ความปลอดภัยสูงมาก) กรุณามองตรงระดับสายตา หรือพิมพ์รหัส นศ. ด้านล่าง');
              }
            }
          }

          // 3. ตรวจสอบด่านตรวจสอบการมีชีวิต (Liveness Verification) เมื่อตรวจจับใบหน้าเสร็จแล้ว
          if (matchedUserRef.current) {
            const { empId, name } = matchedUserRef.current;
            setLivenessStatus(`ยินดีต้อนรับ นศ.พ. ${name}! กรุณากระพริบตา 1 ครั้งเพื่อยืนยันความเป็นมนุษย์ (ระบบป้องกันรูปภาพ)`);
            setAutoScanStatus(`😉 รอตรวจจับการกระพริบตา... (ขนาดดวงตา EAR: ${ear.toFixed(2)})`);

            // หากสแกนหน้าเจอ + กระพริบตาสำเร็จ 1 ครั้ง ➡️ สิ้นสุดด่านผ่านฉลุย
            if (blinkCountRef.current >= 1) {
              stopAutoScan();
              await saveAttendanceLog(empId, name);
            }
          }

        } catch (err) {
          console.error("Auto scan err:", err);
        }
        isAnalyzingRef.current = false;
      };

      const saveAttendanceLog = async (empId, name) => {
        try {
          const { doc, setDoc, collection } = window.FirebaseUtils;
          const logId = Date.now().toString();
          const remarkValue = checkLateStatus(checkInType);

          await setDoc(doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'attendance_logs'), logId), {
            empId, 
            name, 
            timestamp: new Date().toISOString(), 
            type: checkInType,
            locationName: matchedLocation,
            remark: remarkValue 
          });
          setMatchData({ empId, name, locationName: matchedLocation, remark: remarkValue }); 
          stopCamera(); 
          setStep('success');
        } catch (err) { setError('บันทึกประวัติล้มเหลว'); }
      };

      const getThemeConfig = () => {
        switch (checkInType) {
          case 'normal-in': return { color: 'emerald', text: 'เข้างาน', desc: 'พิกัดและเวลาเข้างานถูกต้อง' };
          case 'normal-out': return { color: 'red', text: 'ออกงาน', desc: 'พิกัดและเวลาออกงานถูกต้อง' };
          case 'shift-in': return { color: 'amber', text: 'เข้าเวร', desc: 'พิกัดและเวลาเข้าเวรถูกต้อง' };
          case 'shift-out': return { color: 'rose', text: 'ออกเวร', desc: 'พิกัดและเวลาออกเวรถูกต้อง' };
          default: return { color: 'emerald', text: 'บันทึกเวลา', desc: 'พิกัดเช็คอินถูกต้อง' };
        }
      };

      const theme = getThemeConfig();

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-2xl mx-auto p-8 backdrop-blur-md">
          {error && (
            <div className="mb-6 p-4 bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl flex items-start gap-3 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5 flex-shrink-0 mt-0.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
              <p>{error}</p>
            </div>
          )}

          {step === 'location' && (
            <div className="text-center py-12 flex flex-col items-center">
              <div className={`w-20 h-20 bg-${theme.color}-500/20 border border-${theme.color}-500/40 rounded-full flex items-center justify-center mb-6 animate-pulse`}>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className={`w-10 h-10 text-${theme.color}-400`}><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
              </div>
              <h3 className="text-xl font-bold text-white mb-2">{locationStatus}</h3>
            </div>
          )}

          {step === 'camera' && (
            <div className="flex flex-col items-center">

    // ==========================================
    // 4. HISTORY VIEW
    // ==========================================
    function HistoryView({ db }) {
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all'); 

      useEffect(() => {
        const fetchLogs = async () => {
          try {
            const { collection, getDocs } = window.FirebaseUtils;
            const snapshot = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'attendance_logs'));
            const logsData = [];
            snapshot.forEach(doc => logsData.push({ id: doc.id, ...doc.data() }));
            logsData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            setLogs(logsData);
          } catch (err) {}
          setLoading(false);
        };
        fetchLogs();
      }, [db]);

      const getTypeText = (type) => {
        switch (type) {
          case 'normal-in': return 'เข้างาน';
          case 'normal-out': return 'ออกงาน';
          case 'shift-in': return 'เข้าเวร';
          case 'shift-out': return 'ออกเวร';
          default: return 'เข้างาน';
        }
      };

      const getTypeStyle = (type) => {
        switch (type) {
          case 'normal-in': return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30';
          case 'normal-out': return 'bg-red-500/10 text-red-400 border-red-500/30';
          case 'shift-in': return 'bg-amber-500/10 text-amber-400 border-amber-500/30';
          case 'shift-out': return 'bg-rose-500/10 text-rose-400 border-rose-500/30';
          default: return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30';
        }
      };

      const filteredLogs = logs.filter(log => {
        const matchesSearch = log.empId.toLowerCase().includes(searchQuery.toLowerCase()) || 
                             log.name.toLowerCase().includes(searchQuery.toLowerCase());
        
        if (filterType === 'all') return matchesSearch;
        if (filterType === 'in') return matchesSearch && (log.type === 'normal-in' || log.type === 'shift-in');
        if (filterType === 'out') return matchesSearch && (log.type === 'normal-out' || log.type === 'shift-out');
        return matchesSearch;
      });

      const exportCSV = () => {
        if (filteredLogs.length === 0) return;
        const headers = ['รหัสประจำตัว', 'ชื่อ-นามสกุล', 'สถานที่', 'วันที่', 'เวลา', 'ประเภท', 'หมายเหตุ'];
        const csvRows = [headers.join(',')];
        filteredLogs.forEach(log => {
          const d = new Date(log.timestamp);
          const locName = log.locationName || 'ไม่ระบุพิกัด';
          const remarkValue = log.remark || '-';
          csvRows.push([`"${log.empId}"`, `"${log.name}"`, `"${locName}"`, `"${d.toLocaleDateString('th-TH')}"`, `"${d.toLocaleTimeString('th-TH')}"`, `"${getTypeText(log.type)}"`, `"${remarkValue}"`].join(','));
        });
        const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `attendance_logs_${Date.now()}.csv`;
        link.click();
      };

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-4xl mx-auto backdrop-blur-md">
          <div className="p-6 bg-black/20 border-b border-white/5 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div className="flex flex-1 flex-col sm:flex-row gap-2">
              <div className="relative flex-1">
                <input 
                  type="text" 
                  placeholder="ค้นหาด้วย รหัส หรือ ชื่อนักศึกษา..." 
                  className="w-full pl-10 pr-4 py-2 bg-[#0a0f24] border border-white/10 text-white text-sm rounded-xl outline-none focus:border-blue-500 transition"
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                />
                <svg className="w-4 h-4 text-gray-500 absolute left-3.5 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </div>
              <select 
                className="px-4 py-2 bg-[#0a0f24] border border-white/10 text-gray-300 text-sm rounded-xl outline-none focus:border-blue-500 transition"
                value={filterType}
                onChange={e => setFilterType(e.target.value)}
              >
                <option value="all">แสดงทั้งหมด</option>
                <option value="in">เฉพาะเวลา "เข้า" (In)</option>
                <option value="out">เฉพาะเวลา "ออก" (Out)</option>
              </select>
            </div>
            
            <button onClick={exportCSV} disabled={filteredLogs.length===0} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 text-sm disabled:opacity-50 transition">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
              Export Excel (CSV)
            </button>
          </div>

          <div className="p-6">
            {loading ? <div className="text-center py-10 text-gray-400">กำลังโหลด...</div> : filteredLogs.length === 0 ? <div className="text-center py-10 text-gray-500">ไม่มีข้อมูลตามตัวเลือกที่ค้นหา</div> : (
              <div className="overflow-x-auto rounded-xl border border-white/10 bg-[#0a0f24]/80">
                <table className="w-full text-left border-collapse whitespace-nowrap">
                  <thead>
                    <tr className="border-b border-white/10 bg-white/5 text-gray-400 text-sm">
                      <th className="p-4 w-16 text-center">ลำดับ</th>
                      <th className="p-4">รหัสประจำตัว</th>
                      <th className="p-4">ชื่อ-สกุล</th>
                      <th className="p-4">สถานที่</th>
                      <th className="p-4">วันปฏิบัติงาน/เวลา</th>
                      <th className="p-4 text-center">ประเภท</th>
                      <th className="p-4 text-center">หมายเหตุ</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {filteredLogs.map((log, index) => (
                      <tr key={log.id} className="border-b border-white/5 hover:bg-white/5 transition">
                        <td className="p-4 text-center text-gray-500">{index + 1}</td>
                        <td className="p-4 font-semibold text-gray-200">{log.empId}</td>
                        <td className="p-4 text-gray-300">{log.name}</td>
                        <td className="p-4 text-blue-300">{log.locationName || '-'}</td>
                        <td className="p-4 text-gray-400">{new Date(log.timestamp).toLocaleString('th-TH')}</td>
                        <td className="p-4 text-center">
                          <span className={`px-3 py-1 rounded-full text-xs font-bold border ${getTypeStyle(log.type)}`}>
                            {getTypeText(log.type)}
                          </span>
                        </td>
                        <td className="p-4 text-center">
                          {log.remark ? (
                            <span className="px-2.5 py-1 bg-red-950/40 border border-red-500/20 text-red-400 text-xs rounded-lg font-bold">
                              {log.remark}
                            </span>
                          ) : (
                            <span className="text-gray-600">-</span>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    function AdminGateView({ db, goHome }) {
      const [isAuthorized, setIsAuthorized] = useState(false);
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(true);
      const [dbPassword, setDbPassword] = useState('1234'); 
      const [permissionError, setPermissionError] = useState(false); 

      useEffect(() => {
        const fetchAdminPass = async () => {
          try {
            const { doc, getDoc } = window.FirebaseUtils;
            const configRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'admin_config', 'security');
            const snap = await getDoc(configRef);
            if (snap.exists() && snap.data().pin) {
              setDbPassword(snap.data().pin);
            }
          } catch (e) {
            console.error("Fetch admin pass error:", e);
            if (e.message && (e.message.toLowerCase().includes("permission") || e.message.toLowerCase().includes("denied"))) {
              setPermissionError(true);
            }
          }
          setLoading(false);
        };
        fetchAdminPass();
      }, [db]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (password === dbPassword) {
          setIsAuthorized(true);
          setError('');
        } else {
          setError('รหัสผ่านสำหรับแอดมินไม่ถูกต้อง!');
          setPassword('');
        }
      };

      if (loading) {
        return (
          <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl p-8 max-w-md mx-auto text-center">
            <p className="text-gray-400">กำลังดาวน์โหลดระบบความปลอดภัย...</p>
          </div>
        );
      }

      if (isAuthorized) {
        return <AdminLocationView db={db} dbPassword={dbPassword} setDbPassword={setDbPassword} permissionError={permissionError} />;
      }

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-sm mx-auto p-8 backdrop-blur-md">
          <div className="text-center mb-6">
            <div className="w-16 h-16 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-8 h-8 text-red-400"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg>
            </div>
            <h3 className="text-xl font-bold text-white mb-2">พื้นที่สำหรับแอดมิน</h3>
            <p className="text-gray-400 text-xs">กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดการตั้งค่า</p>
          </div>

          {permissionError && (
            <div className="p-3.5 bg-yellow-950/40 border border-yellow-500/30 text-yellow-400 rounded-xl text-xs mb-4 text-left leading-relaxed">
              ⚠️ <b>แจ้งเตือนปัญหาด้านสิทธิ์ Firebase:</b><br />
              ตรวจพบว่าสิทธิ์การอ่านเขียนของ Firebase โครงการของคุณหมดอายุหรือจำกัดสิทธิ์ไว้ คุณสามารถล็อกอินด้วยรหัสผ่านเริ่มต้น <b>"1234"</b> เพื่อเข้าดูหน้าตั้งค่าได้ก่อนชั่วคราว
            </div>
          )}

          {error && <div className="p-3 bg-red-950/40 border border-red-500/30 text-red-400 rounded-xl text-center text-xs mb-4">{error}</div>}

          <form onSubmit={handleLogin} className="space-y-4">
            <input 
              type="password" 
              className="w-full p-4 bg-[#0a0f24] border border-white/10 text-white rounded-xl text-center text-lg tracking-widest outline-none focus:border-red-500 transition" 
              placeholder="••••"

    // ==========================================
    // 6. ADMIN LOCATION VIEW & STUDENT DATABASE
    // ==========================================
    function AdminLocationView({ db, dbPassword, setDbPassword, permissionError }) {
      const [activeTab, setActiveTab] = useState('locations'); 
      
      const [locations, setLocations] = useState([]);
      const [students, setStudents] = useState([]);
      
      const [loadingLocs, setLoadingLocs] = useState(true);
      const [loadingStudents, setLoadingStudents] = useState(true);
      
      const [formData, setFormData] = useState({ name: '', lat: '', lng: '', radius: 1000 });
      const [error, setError] = useState('');
      const [newAdminPin, setNewAdminPin] = useState('');
      const [pinSuccess, setPinSuccess] = useState('');
      const [studentSearch, setStudentSearch] = useState('');

      const [confirmModal, setConfirmModal] = useState({ isOpen: false, type: '', targetId: '', targetName: '' });

      const fetchLocs = async () => {
        try {
          const { collection, getDocs } = window.FirebaseUtils;
          const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'));
          const locs = [];
          snap.forEach(doc => locs.push({ id: doc.id, ...doc.data() }));
          setLocations(locs);
        } catch(e) {}
        setLoadingLocs(false);
      };

      const fetchStudents = async () => {
        try {
          const { collection, getDocs } = window.FirebaseUtils;
          const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'employees'));
          const stdList = [];
          snap.forEach(doc => stdList.push({ id: doc.id, ...doc.data() }));
          stdList.sort((a,b) => a.empId.localeCompare(b.empId));
          setStudents(stdList);
        } catch(e) {}
        setLoadingStudents(false);
      };

      useEffect(() => { 
        fetchLocs(); 
        fetchStudents();
      }, [db]);

      const getCurrentLoc = () => {
        if(!navigator.geolocation) return setError('ไม่รองรับ GPS');
        navigator.geolocation.getCurrentPosition(
          pos => setFormData(p => ({...p, lat: pos.coords.latitude, lng: pos.coords.longitude})),
          err => setError('ดึงพิกัดไม่ได้'),
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      };

      const handleAdd = async (e) => {
        e.preventDefault();
        if(!formData.name || !formData.lat || !formData.lng || !formData.radius) return setError('กรอกข้อมูลให้ครบ');
        setError('');
        try {
          const { collection, addDoc } = window.FirebaseUtils;
          await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'locations'), {
            name: formData.name, lat: parseFloat(formData.lat), lng: parseFloat(formData.lng), radius: parseInt(formData.radius, 10)
          });
          setFormData({ name: '', lat: '', lng: '', radius: 1000 });
          fetchLocs();
        } catch(e) { setError('บันทึกไม่ได้ เนื่องจากสิทธิ์การเข้าถึงฐานข้อมูลจำกัด'); }
      };

      const triggerDeleteLoc = (id, name) => {
        setConfirmModal({ isOpen: true, type: 'location', targetId: id, targetName: name });
      };

      const triggerDeleteStudent = (id, name) => {
        setConfirmModal({ isOpen: true, type: 'student', targetId: id, targetName: name });
      };

      const executeDelete = async () => {
        const { targetId, type } = confirmModal;
        setConfirmModal({ isOpen: false, type: '', targetId: '', targetName: '' });
        
        try {
          const { doc, deleteDoc } = window.FirebaseUtils;
          if (type === 'location') {
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'locations', targetId));
            await fetchLocs();
          } else if (type === 'student') {
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', targetId));
            await fetchStudents();
          }
        } catch (e) {
          setError('การลบข้อมูลล้มเหลว เนื่องจากข้อจำกัดสิทธิ์ในระบบ');
        }
      };

      const handleUpdatePin = async (e) => {
        e.preventDefault();
        if (!newAdminPin.trim()) return;
        try {
          const { doc, setDoc } = window.FirebaseUtils;
          await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'admin_config', 'security'), {
            pin: newAdminPin
          });
          setDbPassword(newAdminPin);
          setPinSuccess('เปลี่ยนรหัสผ่านสำเร็จแล้ว!');
          setNewAdminPin('');
          setTimeout(() => setPinSuccess(''), 3000);
        } catch (err) {
          setError('ไม่สามารถเปลี่ยนรหัสผ่านได้เนื่องจากสิทธิ์การเข้าถึงฐานข้อมูล Firebase จำกัด');
        }
      };

      const filteredStudents = students.filter(student => 
        student.empId.toLowerCase().includes(studentSearch.toLowerCase()) || 
        student.name.toLowerCase().includes(studentSearch.toLowerCase())
      );

      return (
        <div className="bg-[#151c33]/80 border border-white/10 rounded-3xl shadow-xl overflow-hidden max-w-4xl mx-auto backdrop-blur-md relative">
          
          {/* Custom Confirmation UI Modal */}
          {confirmModal.isOpen && (
            <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-50 p-4 rounded-3xl backdrop-blur-sm">
              <div className="bg-[#151c33] border border-white/10 rounded-2xl p-6 max-w-sm w-full text-center">
                <svg className="w-12 h-12 text-red-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                <h4 className="text-lg font-bold text-white mb-2">ยืนยันการลบข้อมูล?</h4>
                <p className="text-sm text-gray-400 mb-6">
                  {confirmModal.type === 'location' 
                    ? `คุณแน่ใจหรือไม่ว่าต้องการลบพิกัดสถานที่ปฏิบัติงาน "${confirmModal.targetName}"?` 
                    : `คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลสิทธิ์และโปรไฟล์ใบหน้าของรหัส "${confirmModal.targetId}" (${confirmModal.targetName})?`
                  }
                </p>
                <div className="flex gap-2">
                  <button onClick={executeDelete} className="flex-1 py-2.5 bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl text-sm transition">ยืนยันการลบ</button>
                  <button onClick={() => setConfirmModal({ isOpen: false, type: '', targetId: '', targetName: '' })} className="flex-1 py-2.5 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-xl text-sm transition">ยกเลิก</button>
                </div>
              </div>
            </div>
          )}

          {/* แถบ Tab ในหน้า Admin */}
          <div className="flex border-b border-white/10 bg-black/10">
            <button 
              onClick={() => setActiveTab('locations')}
              className={`flex-1 py-4 text-center font-bold text-sm transition ${activeTab === 'locations' ? 'text-blue-400 bg-white/5 border-b-2 border-blue-500' : 'text-gray-400 hover:text-gray-200'}`}
            >
              📍 จัดการจุดพิกัด (Geofence)
            </button>
            <button 
              onClick={() => setActiveTab('students')}
              className={`flex-1 py-4 text-center font-bold text-sm transition ${activeTab === 'students' ? 'text-blue-400 bg-white/5 border-b-2 border-blue-500' : 'text-gray-400 hover:text-gray-200'}`}
            >
              🎓 ทะเบียนใบหน้า/ลบสิทธิ์ นศ.
            </button>
            <button 
              onClick={() => setActiveTab('settings')}
              className={`flex-1 py-4 text-center font-bold text-sm transition ${activeTab === 'settings' ? 'text-blue-400 bg-white/5 border-b-2 border-blue-500' : 'text-gray-400 hover:text-gray-200'}`}
            >
              🔑 เปลี่ยนรหัสผ่าน Admin
            </button>
          </div>

          <div className="p-8">
            {permissionError && (
              <div className="mb-6 p-4 bg-yellow-950/40 border border-yellow-500/30 text-yellow-400 rounded-xl text-xs leading-relaxed">
                📢 <b>วิธีการตั้งค่าเพื่อให้สแกนผ่านและบันทึกพิกัดสถานที่ได้ 100%:</b><br />
                เนื่องจาก Firebase ของคุณขึ้นข้อผิดพลาด <b>Missing or insufficient permissions</b> คุณจำเป็นต้องเปลี่ยนการตั้งค่ากฎความปลอดภัยบน Firebase Console ดังนี้:<br />
                1. ไปที่หน้าเว็บไซต์ <b>Firebase Console</b> จากนั้นเลือกแท็บเมนู <b>Firestore Database</b><br />
                2. มองหาแท็บหัวข้อด้านบนชื่อ <b>"Rules"</b> (กฎความปลอดภัย)<br />
                3. คัดลอกและเขียนโค้ดทับด้วยกฎตามนี้เพื่ออนุญาตให้อ่านและเขียนได้อย่างถูกต้อง:<br />
                <pre className="bg-black/50 p-2.5 rounded-lg mt-1.5 font-mono text-gray-300 select-all overflow-x-auto">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}`}
                </pre>
                4. เมื่อก๊อปไปวางทับเรียบร้อยแล้ว ให้กดปุ่ม <b>"Publish"</b> สีฟ้าด้านขวาบนของ Firebase แล้วรีเฟรชหน้าเว็บนี้เพื่อใช้งานแบบสมบูรณ์ครับ!
              </div>
            )}

            {error && <div className="mb-6 p-4 bg-red-900/30 text-red-400 rounded-xl">{error}</div>}

            {/* TAB 1: จัดการสถานที่ */}
            {activeTab === 'locations' && (
              <div className="grid md:grid-cols-3 gap-8">
                <div className="md:col-span-1 bg-[#0a0f24]/80 p-6 rounded-2xl border border-white/10 h-fit">
                  <h3 className="text-md font-bold text-white mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-5 h-5 text-gray-400"><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                    เพิ่มสถานที่ใหม่
                  </h3>
                  <form onSubmit={handleAdd} className="space-y-4">
                    <input type="text" placeholder="ชื่อสถานที่" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} />
                    <div className="grid grid-cols-2 gap-2">
                      <input type="number" step="any" placeholder="Lat" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition text-sm" value={formData.lat} onChange={e=>setFormData({...formData, lat: e.target.value})} />
                      <input type="number" step="any" placeholder="Lng" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition text-sm" value={formData.lng} onChange={e=>setFormData({...formData, lng: e.target.value})} />
                    </div>
                    <button type="button" onClick={getCurrentLoc} className="w-full py-2.5 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-xl text-xs transition flex items-center justify-center gap-1.5 border border-blue-500/20">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-6v8m-3-12.125a2.25 2.25 0 114.5 0V18a2.25 2.25 0 01-4.5 0V3.625z" /></svg>
                      ดึงพิกัดปัจจุบันด่วน
                    </button>
                    <input type="number" placeholder="ระยะรัศมี (เมตร)" className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-blue-500 transition" value={formData.radius} onChange={e=>setFormData({...formData, radius: e.target.value})} />
                    <button type="submit" className="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 rounded-xl transition">บันทึกสถานที่</button>
                  </form>
                </div>

                <div className="md:col-span-2">
                  <h3 className="text-lg font-bold text-white mb-4">สถานที่ที่อนุญาตให้เช็คอิน</h3>
                  {loadingLocs ? <p className="text-gray-500">กำลังโหลด...</p> : locations.length === 0 ? <p className="text-yellow-400 text-sm">ยังไม่มีการตั้งค่า ระบบจะใช้พิกัดเริ่มต้น (กรุณาเพิ่มสถานที่อย่างน้อย 1 จุด)</p> : (
                    <div className="space-y-3">
                      {locations.map(loc => (
                        <div key={loc.id} className="bg-[#0a0f24]/80 border border-white/10 rounded-2xl p-4 flex justify-between items-center hover:border-white/20 transition">
                          <div>
                            <h4 className="text-gray-200 font-bold">{loc.name}</h4>
                            <div className="text-xs text-gray-500 mt-1">Lat: {Number(loc.lat).toFixed(4)} | Lng: {Number(loc.lng).toFixed(4)} | รัศมี {loc.radius}m</div>
                          </div>
                          <button onClick={()=>triggerDeleteLoc(loc.id, loc.name)} className="p-2.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-xl transition">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB 2: จัดการรายชื่อนักศึกษาและประวัติลงทะเบียนใบหน้า */}
            {activeTab === 'students' && (
              <div>
                <div className="flex items-center justify-between mb-4 flex-col sm:flex-row gap-3">
                  <h3 className="text-lg font-bold text-white">รายชื่อนักศึกษาแพทย์ที่บันทึกใบหน้าในระบบ</h3>
                  <div className="relative w-full sm:w-64">
                    <input 
                      type="text" 
                      placeholder="ค้นหารหัส หรือ ชื่อ..." 
                      className="w-full pl-9 pr-4 py-1.5 bg-[#0a0f24] border border-white/10 text-white text-xs rounded-xl outline-none focus:border-blue-500 transition"
                      value={studentSearch}
                      onChange={e => setStudentSearch(e.target.value)}
                    />
                    <svg className="w-3.5 h-3.5 text-gray-500 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                  </div>
                </div>

                {loadingStudents ? <p className="text-gray-500">กำลังดึงข้อมูล...</p> : filteredStudents.length === 0 ? <p className="text-gray-500 text-sm">ไม่พบข้อมูลนักศึกษา</p> : (
                  <div className="overflow-x-auto rounded-xl border border-white/10 bg-[#0a0f24]/80">
                    <table className="w-full text-left border-collapse whitespace-nowrap">
                      <thead>
                        <tr className="border-b border-white/10 bg-white/5 text-gray-400 text-sm">
                          <th className="p-4 w-16 text-center">ลำดับ</th>
                          <th className="p-4">รหัสประจำตัว</th>
                          <th className="p-4">ชื่อ-สกุล</th>
                          <th className="p-4">วันที่ลงทะเบียน</th>
                          <th className="p-4 text-center">การจัดการ</th>
                        </tr>
                      </thead>
                      <tbody className="text-sm">
                        {filteredStudents.map((student, idx) => (
                          <tr key={student.id} className="border-b border-white/5 hover:bg-white/5 transition">
                            <td className="p-4 text-center text-gray-500">{idx + 1}</td>
                            <td className="p-4 font-semibold text-gray-200">{student.empId}</td>
                            <td className="p-4 text-gray-300">{student.name}</td>
                            <td className="p-4 text-gray-400">{new Date(student.registeredAt).toLocaleDateString('th-TH')}</td>
                            <td className="p-4 text-center">
                              <button 
                                onClick={() => triggerDeleteStudent(student.id, student.name)}
                                className="px-3 py-1 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500 hover:text-white rounded-lg text-xs transition"
                              >
                                ลบใบหน้า / ย้ายสิทธิ์
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}

            {/* TAB 3: ตั้งค่ารหัสผ่าน */}
            {activeTab === 'settings' && (
              <div className="max-w-md mx-auto bg-[#0a0f24]/80 p-6 rounded-2xl border border-white/10">
                <h3 className="text-md font-bold text-white mb-4 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.8" stroke="currentColor" className="w-5 h-5 text-gray-400"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg>
                  เปลี่ยนรหัสผ่านสำหรับเข้าสู่ระบบแอดมิน
                </h3>
                {pinSuccess && <div className="p-2.5 mb-3 bg-green-950/40 border border-green-500/30 text-green-400 rounded-xl text-center text-xs">{pinSuccess}</div>}
                <form onSubmit={handleUpdatePin} className="space-y-3">
                  <input 
                    type="password" 
                    placeholder="ป้อนรหัสผ่านใหม่" 
                    className="w-full p-3 bg-[#151c33] text-white rounded-xl outline-none border border-white/5 focus:border-red-500 transition text-sm text-center" 
                    value={newAdminPin} 
                    onChange={e => setNewAdminPin(e.target.value)} 
                  />
                  <button type="submit" className="w-full py-2 bg-red-600 hover:bg-red-500 text-white font-bold text-sm rounded-xl transition">
                    อัปเดตรหัสผ่านระบบ
                  </button>
                </form>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Initialize React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
